/* Tween */
const tws=[];
function tw(o,to,dur,onU,onC){const fr={};Object.keys(to).forEach(k=>fr[k]=o[k]);const s=performance.now();tws.push({update(n){const p=Math.min(1,(n-s)/dur),e=1-Math.pow(1-p,3);Object.keys(to).forEach(k=>o[k]=fr[k]+(to[k]-fr[k])*e);onU?.(e);if(p>=1){onC?.();return true}return false}})}
function utw(n){for(let i=tws.length-1;i>=0;i--)if(tws[i].update(n))tws.splice(i,1)}

/* Map */
const PC=[104.5,35],SC=2;
function proj([lng,lat]){return[(lng-PC[0])*SC*Math.cos(lat*Math.PI/180),(lat-PC[1])*SC]}
const mapG=new THREE.Group();mapG.rotation.x=-Math.PI/2;scene.add(mapG);
const pmeshes=[];const floaters=[];const rings=[];const mixers=[];

async function buildMap(geo){
  const modelPromises=[];
  geo.features.forEach(f=>{
    const nm=f.properties.name;const pd=P[nm];const an=pd?pd.animals[0]:null;const st=an?LS[an.lv]:null;
    const terrain=TM[nm]||'farmland';const h=(st?st.h:1.5)+(TE[terrain]||.5);const tc=TC[terrain]||TC.farmland;
    const polys=f.geometry.type==="MultiPolygon"?f.geometry.coordinates:[f.geometry.coordinates];
    polys.forEach(poly=>{
      const outer=poly[0];const shape=new THREE.Shape();
      outer.forEach((pt,i)=>{const[x,y]=proj(pt);i===0?shape.moveTo(x,y):shape.lineTo(x,y)});
      for(let hi=1;hi<poly.length;hi++){const hole=new THREE.Path();poly[hi].forEach((pt,j)=>{const[x,y]=proj(pt);j===0?hole.moveTo(x,y):hole.lineTo(x,y)});shape.holes.push(hole)}
      const gE=new THREE.ExtrudeGeometry(shape,{depth:h,bevelEnabled:true,bevelThickness:.12,bevelSize:.1,bevelSegments:2});
      const topMat=new THREE.MeshStandardMaterial({color:tc.top,emissive:st?st.emi:0x081420,emissiveIntensity:.12,roughness:.55,metalness:.12});
      const sideMat=new THREE.MeshStandardMaterial({color:tc.side,emissive:st?st.emi:0x040a10,emissiveIntensity:.08,roughness:.7,metalness:.08});
      const mesh=new THREE.Mesh(gE,[topMat,sideMat]);mesh.castShadow=true;mesh.receiveShadow=true;
      mesh.userData={name:nm,animal:an,terrain,baseEI:.12};mapG.add(mesh);pmeshes.push(mesh);
      mapG.add(new THREE.LineSegments(new THREE.EdgesGeometry(gE,25),new THREE.LineBasicMaterial({color:0x88aacc,transparent:true,opacity:.1})));
    });

    const ctr=f.properties.center||f.properties.centroid;
    if(!an||!ctr)return;
    const[cx,cy]=proj(ctr);const bH=h+2.5;
    /* light beam */
    const bm1=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,bH,6,1,true),new THREE.MeshBasicMaterial({color:st.color,transparent:true,opacity:.55,side:THREE.DoubleSide,depthWrite:false}));
    bm1.position.set(cx,bH/2,-cy);scene.add(bm1);
    const bm2=new THREE.Mesh(new THREE.CylinderGeometry(.2,.2,bH,8,1,true),new THREE.MeshBasicMaterial({color:st.color,transparent:true,opacity:.08,side:THREE.DoubleSide,depthWrite:false}));
    bm2.position.set(cx,bH/2,-cy);scene.add(bm2);
    /* ring */
    const ring=new THREE.Mesh(new THREE.RingGeometry(.9,1.2,24),new THREE.MeshBasicMaterial({color:st.color,transparent:true,opacity:.28,side:THREE.DoubleSide,depthWrite:false}));
    ring.rotation.x=-Math.PI/2;ring.position.set(cx,h+.08,-cy);scene.add(ring);rings.push(ring);
    /* label */
    const cnt=pd.animals.length;
    const sp=mkLabel(an.n+(cnt>1?' 等'+cnt+'种':''),st.color);
    sp.position.set(cx,h+7,-cy);sp.userData={baseY:h+7};scene.add(sp);floaters.push(sp);

    /* 3D model */
    let mk=CAT_MODEL[an.c];
    if(an.c==='bird'&&STORK_SET.has(an.n))mk='stork';
    if(mk){
      modelPromises.push(ldG(mk).then(g=>{
        const m=g.scene.clone();
        const sc={flamingo:.025,stork:.025,horse:.018,parrot:.035};
        m.scale.setScalar(sc[mk]||.025);
        m.position.set(cx,h+3.5,-cy);
        m.traverse(o=>{if(o.isMesh){o.material=o.material.clone();o.material.emissive=new THREE.Color(st.emi);o.material.emissiveIntensity=.25;o.material.roughness=.45;o.material.metalness=.2;o.castShadow=true}});
        scene.add(m);floaters.push(m);m.userData={baseY:h+3.5,isModel:true,name:nm};
        if(g.animations?.length){const mx=new THREE.AnimationMixer(m);mx.clipAction(g.animations[0]).play();mixers.push(mx)}
      }).catch(()=>{}));
    }
  });
  await Promise.allSettled(modelPromises);
}

function mkLabel(text,col){
  const c=document.createElement('canvas'),D=2;c.width=300*D;c.height=56*D;
  const x=c.getContext('2d');x.scale(D,D);
  x.fillStyle='rgba(2,8,18,.92)';rrect(x,2,4,296,48,10);x.fill();
  x.strokeStyle='rgba(140,180,220,.18)';x.lineWidth=1;rrect(x,2,4,296,48,10);x.stroke();
  x.shadowColor='rgba(0,0,0,.6)';x.shadowBlur=3;x.shadowOffsetY=1;
  x.fillStyle='#e0ecf6';x.font='bold 18px "PingFang SC","Microsoft YaHei",sans-serif';
  x.textAlign='center';x.textBaseline='middle';x.fillText(text,150,28);
  const t=new THREE.CanvasTexture(c);t.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false}));
  sp.scale.set(10,2,1);sp.renderOrder=999;return sp;
}
function rrect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath()}

/* ===== Panel ===== */
let curProv='',curAnimals=[],curIdx=0,curTerrain='';

function showP(prov,terrain){
  curProv=prov;curTerrain=terrain;
  const pd=P[prov];if(!pd)return;
  curAnimals=pd.animals;curIdx=0;
  document.getElementById('p-prov').innerText=prov;
  buildTabs();renderAnimal(0);
  const panel=document.getElementById('panel');panel.style.display='block';panel.scrollTop=0;
  requestAnimationFrame(()=>panel.classList.add('show'));
}

function buildTabs(){
  const tabs=document.getElementById('p-tabs');tabs.innerHTML='';
  curAnimals.forEach((a,i)=>{
    const t=document.createElement('div');
    t.className='p-tab'+(i===0?' active':'');
    t.innerHTML=a.n+`<span class="tab-lv" style="background:${LV_BG[a.lv]||'#333'}">${a.lv}</span>`;
    /* 用 pointerdown 替代 click，确保 tab 不被吞 */
    t.addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();switchTab(i)});
    tabs.appendChild(t);
  });
}

function switchTab(idx){
  if(idx===curIdx)return;
  curIdx=idx;
  document.querySelectorAll('#p-tabs .p-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderAnimal(idx);
}

function renderAnimal(idx){
  const a=curAnimals[idx];if(!a)return;
  const s=LS[a.lv];const tn=TC[curTerrain];
  document.getElementById('p-name').innerText=a.n;
  document.getElementById('p-latin').innerText=a.la;
  document.getElementById('p-meta').innerHTML=`<span class="p-tag ${a.lv}">${a.lv} · ${s.t}</span>`+(tn?`<span class="p-terrain-tag">${tn.name}</span>`:'');
  document.getElementById('p-desc').innerText=a.d;
  const dyKey=encodeURIComponent(a.n+' 濒危动物');
  const dyUrl='https://www.douyin.com/search/'+dyKey+'?type=video';
  const vEl=document.getElementById('p-video');
  vEl.innerHTML='<a href="'+dyUrl+'" target="_blank" rel="noopener noreferrer"><svg width="16" height="16" viewBox="0 0 48 48" fill="none"><path d="M21.4 4h6.2c-.2 5.4 3.4 10.4 9.4 11.2v6.6c-3.4.2-6.4-1-9-2.8v12.8c0 10-10.8 15.2-18.2 9.4-4.8-3.8-6.4-11.2-2.8-16.8 3.8-5.8 12-7 16.4-3.4v7c-1-.6-2.2-.8-3.2-.8-2.8.2-5 2.6-4.6 5.6.4 3.2 3.6 5 6.6 4 2.4-.8 4-3.2 4-5.8V4h-4.8z" fill="#fe2c55"/></svg>去抖音看视频资料</a>';
  document.getElementById('p-count').innerText='该地区共录入 '+curAnimals.length+' 种濒危物种';
  const img=document.getElementById('p-img'),ph=document.getElementById('p-ph');
  if(a.img){
    img.style.display='none';ph.style.display='flex';ph.innerText='图片加载中...';
    img.onload=()=>{img.style.display='block';ph.style.display='none'};
    img.onerror=()=>{ph.innerText='暂无图片';ph.style.display='flex';img.style.display='none'};
    img.src=a.img;
  }else{img.style.display='none';ph.style.display='flex';ph.innerText='暂无图片'}
}



document.getElementById('pc').addEventListener('pointerdown',e=>{e.stopPropagation();const p=document.getElementById('panel');p.classList.remove('show');setTimeout(()=>{p.style.display='none';panelHover=false},450)});

/* 阻止面板上所有 pointer 事件穿透 */
document.getElementById('panel').addEventListener('pointerdown',e=>e.stopPropagation());
document.getElementById('panel').addEventListener('click',e=>e.stopPropagation());

/* Raycaster */
const ray=new THREE.Raycaster(),ptr=new THREE.Vector2();let hov=null;
const tip=document.getElementById('tooltip');
addEventListener('pointermove',e=>{
  if(panelHover)return;
  ptr.x=(e.clientX/innerWidth)*2-1;ptr.y=-(e.clientY/innerHeight)*2+1;
  tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY+14)+'px';
});
addEventListener('click',e=>{
  if(panelHover)return;
  if(hov?.userData.animal){flyTo(hov);showP(hov.userData.name,hov.userData.terrain)}
});

function flyTo(m){
  m.geometry.computeBoundingBox();const c=new THREE.Vector3();m.geometry.boundingBox.getCenter(c);
  const w=c.applyMatrix4(m.matrixWorld);const tC=w.clone().add(new THREE.Vector3(0,22,28));
  const sC=cam.position.clone(),sT=oc.target.clone();
  const o={t:0};tw(o,{t:1},1000,e=>{cam.position.lerpVectors(sC,tC,e);oc.target.lerpVectors(sT,w,e)});
}

document.getElementById('btn-rot').onclick=function(){oc.autoRotate=!oc.autoRotate;oc.autoRotateSpeed=.4;this.classList.toggle('on',oc.autoRotate)};
document.getElementById('btn-rst').onclick=()=>{const sC=cam.position.clone(),sT=oc.target.clone();const o={t:0};tw(o,{t:1},900,e=>{cam.position.lerpVectors(sC,new THREE.Vector3(0,90,130),e);oc.target.lerpVectors(sT,new THREE.Vector3(0,0,0),e)})};

/* Load */
fetch("https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json")
.then(r=>r.json()).then(async geo=>{
  await buildMap(geo);
  document.getElementById('loading').style.display='none';
  document.getElementById('legend').style.display='block';
  document.getElementById('ctrls').style.display='flex';
}).catch(e=>{document.getElementById('loading').innerHTML='<div style="color:#ef4444">加载失败：'+e.message+'</div>'});

/* Render */
const clock=new THREE.Clock();
function anim(){
  requestAnimationFrame(anim);
  const now=performance.now(),t=clock.getElapsedTime(),dt=clock.getDelta();
  utw(now);mixers.forEach(m=>m.update(dt));
  floaters.forEach((f,i)=>{
    if(f.isSprite)f.position.y=f.userData.baseY+Math.sin(t*1.5+i)*.2;
    else if(f.userData?.isModel){f.position.y=f.userData.baseY+Math.sin(t*1.2+i*.5)*.3;f.rotation.y+=.004}
  });
  rings.forEach((r,i)=>{const s=1+Math.sin(t*2+i)*.06;r.scale.set(s,s,1);r.material.opacity=.22+Math.sin(t*1.8+i)*.08});
  if(!panelHover){
    ray.setFromCamera(ptr,cam);
    const hits=ray.intersectObjects(pmeshes,false);
    if(hits.length){
      const o=hits[0].object;
      if(hov!==o){resetHov();hov=o;
        if(Array.isArray(o.material))o.material.forEach(m=>m.emissiveIntensity=.5);else o.material.emissiveIntensity=.5;
        const a=o.userData.animal,tn=TC[o.userData.terrain],pd=P[o.userData.name];const cnt=pd?pd.animals.length:0;
        tip.style.display='block';
        tip.innerHTML=a?`<b style="color:#ffd770">${o.userData.name}</b> · ${a.n}${cnt>1?' 等'+cnt+'种':''}<br><span style="color:#6a9abc;font-size:10px">${tn?tn.name:''} · 点击查看</span>`:`<b>${o.userData.name}</b>`;
        document.body.style.cursor='pointer';
      }
    }else{resetHov();tip.style.display='none';document.body.style.cursor='default'}
  }
  oc.update();comp.render();
}
function resetHov(){if(hov){const ei=hov.userData.baseEI||.12;if(Array.isArray(hov.material))hov.material.forEach(m=>m.emissiveIntensity=ei);else hov.material.emissiveIntensity=ei;hov=null}}
anim();
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);comp.setSize(innerWidth,innerHeight)});
</script>
